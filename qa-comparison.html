<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>设计对照验收</title>
    <style>

    </style>
  </head>
  <body>
    <header><strong>太阳系科普网站 · 设计对照</strong><span>1440 × 1024 首屏状态</span></header>
    <main>
      <section class="panel"><h2>参考组合稿</h2><img src="qa/reference.png" alt="参考组合稿" /></section>
      <section class="panel"><h2>开发实现</h2><img src="qa/implementation.png" alt="开发实现" /></section>
    </main>
  </body>
</html>
